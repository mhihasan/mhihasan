name: Update GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"    # Daily at midnight UTC
  workflow_dispatch:       # Manual trigger for testing

jobs:
  update-metrics:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: tools/metrics-collector/go.sum

      - name: Build metrics collector
        run: go build -o bin/metrics-collector ./cmd/
        working-directory: tools/metrics-collector

      - name: Collect and update metrics
        env:
          GH_TOKEN: ${{ secrets.GH_METRICS_PAT }}
          USERNAME: mhihasan
        run: ./tools/metrics-collector/bin/metrics-collector

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if ! git diff --quiet README.md docs/metrics-history.json 2>/dev/null; then
            git add README.md docs/metrics-history.json
            git commit -m "chore: update GitHub metrics [skip ci]"
            git pull --rebase origin ${{ github.ref_name }} || true
            git push
            echo "Metrics updated successfully!"
          else
            echo "No changes to commit."
          fi
